---
layout: default
permalink: /search/
sitemap: false
---

<h2>🔍 검색 결과</h2>

<div id="search-results">
  <p style="text-align:center; color:var(--muted); padding:40px 0;" id="search-status">검색어를 입력해주세요.</p>
</div>

<script>
(function() {
  // GET ?q=... 읽기
  const params = new URLSearchParams(window.location.search);
  const q = (params.get('q') || '').trim();
  if (!q) return;

  const status = document.getElementById('search-status');
  const resultsDiv = document.getElementById('search-results');

  // 모든 포스트 데이터를 JSON으로 내장
  const posts = [
    {% for post in site.posts %}
    {
      title: {{ post.title | jsonify }},
      summary: {{ post.summary | jsonify }},
      field: {{ post.field | jsonify }},
      arxiv_id: {{ post.arxiv_id | jsonify }},
      url: {{ post.url | relative_url | jsonify }},
      date: {{ post.date | date: '%Y-%m-%d' | jsonify }}
    }{% unless forloop.last %},{% endunless %}
    {% endfor %}
  ];

  const qLower = q.toLowerCase();
  const results = posts.filter(p => {
    return (p.title && p.title.toLowerCase().includes(qLower))
        || (p.summary && p.summary.toLowerCase().includes(qLower))
        || (p.field && p.field.toLowerCase().includes(qLower))
        || (p.arxiv_id && p.arxiv_id.includes(q));
  });

  status.innerHTML = `'${q}' 검색 결과 <strong>${results.length}</strong>건`;

  if (results.length === 0) {
    resultsDiv.innerHTML = '<p style="text-align:center; color:var(--muted); padding:40px 0;">검색 결과가 없습니다.</p>';
  } else {
    resultsDiv.innerHTML = '<div class="cards">' + results.map(p => {
      return `<a class="card" href="${p.url}">
        <h3>${p.title}</h3>
        <p class="summary">${p.summary}</p>
        <div class="meta">
          <span class="tag">arXiv:${p.arxiv_id}</span>
          <span>📄 ${p.date}</span>
          <span>🏷 ${p.field}</span>
        </div>
      </a>`;
    }).join('') + '</div>';
  }
})();
</script>
