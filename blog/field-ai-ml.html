---
layout: default
permalink: /field/ai-ml/
---

<section class="intro">
  <p>AI/ML 분야에서 최신 논문을 <strong>한국어 한 줄 요약</strong>으로 정리합니다.</p>
</section>

<h2>🤖 AI/ML 논문</h2>

<ul class="report-list">
{% for post in site.posts %}
  {% if post.field == "AI/ML" %}
  <li>
    <div class="rl-head">
      <time>{{ post.date | date: "%Y-%m-%d" }}</time>
      <span class="field-tag">{{ post.field }}</span>
    </div>
    <div class="rl-top3">
      <span class="rl-label">논문</span>
      <span class="t3-chip">
        <a href="{{ post.url | relative_url }}">{{ post.title | truncate: 36 }}</a>
      </span>
    </div>
  </li>
  {% endif %}
{% endfor %}
</ul>
