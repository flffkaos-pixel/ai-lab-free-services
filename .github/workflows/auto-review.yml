name: AI 논문 리뷰 - 자동 실행

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 시스템 패키지 설치
        run: |
          sudo apt-get update
          sudo apt-get install -y poppler-utils

      - name: Python 패키지 설치
        run: pip install requests

      - name: 스크립트 실행
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GMAIL_USER: flffkaos@gmail.com
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          curl -fsSL https://raw.githubusercontent.com/flffkaos-pixel/ai-lab-free-services/main/run_review.py -o run_review.py
          echo "스크립트 다운로드 완료: $(wc -l < run_review.py)줄"
          git pull origin master --rebase 2>/dev/null || true
          python run_review.py