name: AI 연구소 - 완전 자동 논문 리뷰

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 구글 시트 확인 + 논문 분석 + 이메일 발송
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
        run: |
          pip install requests openai

          python -c "
          import os, json, requests, smtplib
          from email.mime.text import MIMEText
          from datetime import datetime

          SID='1q-3_iJEWNfQr8a2N45aEH0hqCXUpOp2m59gNpM38K4w'
          NVIDIA_KEY=os.environ['NVIDIA_API_KEY']
          EMAIL='flffkaos@gmail.com'
          EMAIL_PW='tvck udjx egic ukdg'
          CHK='last_check.json'

          def send_email(to, subj, body):
              m=MIMEText(body,'plain','utf-8')
              m['Subject'],m['From'],m['To']=subj,EMAIL,to
              s=smtplib.SMTP_SSL('smtp.gmail.com',465)
              s.login(EMAIL,EMAIL_PW)
              s.send_message(m);s.quit()

          def review_paper(title, content):
              prompt=f'''다음 논문을 6가지 영역으로 분석해주세요. 한국어로 답변.

          논문 제목: {title}
          논문 내용: {content[:3000]}

          1. 논리 구조: 연구 질문→가설→방법론→결론 흐름이 논리적인가?
          2. 가독성: 초록만 읽고 핵심 파악이 가능한가?
          3. 편향: 연구 가정이 특정 문화권에 편향되었는가?
          4. 방법론: 통계 검정 선택이 적절한가? p-hacking 의심?
          5. 영문 초록: 한글-영문 일치하는가?
          6. 종합 평가: Critical(필수보완) / Recommended(권장보완) / 투고 가능성

          각 영역을 문제점 → 개선 제안 순서로 작성. 마지막에 총평 한 줄.'''
              r=requests.post('https://integrate.api.nvidia.com/v1/chat/completions',
                  headers={'Authorization':f'Bearer {NVIDIA_KEY}','Content-Type':'application/json'},
                  json={'model':'deepseek-ai/deepseek-v4-pro','messages':[{'role':'user','content':prompt}],'temperature':0.3},
                  timeout=120)
              return r.json()['choices'][0]['message']['content']

          def get_rows():
              r=requests.get(f'https://docs.google.com/spreadsheets/d/{SID}/export?format=csv')
              r.raise_for_status()
              text=r.text.replace('\r','')
              lines=text.strip().split('\n')
              h=lines[0].split(',')
              rows=[]
              for line in lines[1:]:
                  if not line.strip():continue
                  v,c,q=[],'',False
                  for ch in line:
                      if ch=='\"':q=not q
                      elif ch==','and not q:v.append(c.strip().strip('\"'));c=''
                      else:c+=ch
                  v.append(c.strip().strip('\"'))
                  rows.append(dict(zip(h,v)))
              return rows

          data=get_rows()
          lp=0
          if os.path.exists(CHK):lp=json.load(open(CHK)).get('last_row',0)
          new=data[lp:]
          if not new:
              print('신청 없음')
              exit(0)

          for i,row in enumerate(new):
              name=row.get('이름','익명')
              email=row.get('이메일','')
              title=row.get('논문 제목','')
              content=row.get('논문파일 업로드','')
              print(f'[{lp+i+2}행] {name} - {title}')

              review=review_paper(title, content)

              # 신청자에게 발송
              if review and email:
                  body=f'''{name}님, 신청하신 논문 리뷰 결과입니다.

          ━━━━━━━━━━━━━━━━━━━━━━━
          📜 {title}
          📅 {datetime.now().strftime('%Y-%m-%d')}
          ━━━━━━━━━━━━━━━━━━━━━━━

          {review}

          ━━━━━━━━━━━━━━━━━━━━━━━
          ⚠️ 본 리뷰는 AI의 1차 분석입니다. 투고 전 반드시 지도교수님 확인을 받으세요.
          AI 연구소 드림
          '''
                  send_email(email, f'[논문 리뷰] {title}', body)
                  send_email(EMAIL, f'[처리완료] {name} - {title}', f'{name}님 결과 발송 완료')
                  print(f'  ✅ {email}로 발송')
              else:
                  print(f'  ⚠️ 건너뜀')

          json.dump({'last_row':len(data),'updated':datetime.now().isoformat()},open(CHK,'w'))
          print(f'완료: {len(new)}건')
          "