name: AI 논문 리뷰 - 자동 실행

on:
  schedule:
    - cron: '0 0 * * *'  # 매일 한국 오전 9시 (UTC 0시)
  workflow_dispatch:

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: 자격 증명 설정
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          mkdir -p ~/.hermes
          cat > ~/.hermes/credentials << EOF
          GH_TOKEN=***          GROQ_API_KEY=***          GMAIL_USER=flffkaos@gmail.com
          GMAIL_APP_PASSWORD=$GMAIL...WORD
          EOF
          chmod 600 ~/.hermes/credentials
          CRED_EOF
          chmod 600 ~/.hermes/credentials

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 시스템 패키지 설치
        run: |
          sudo apt-get update
          sudo apt-get install -y poppler-utils

      - name: Python 패키지 설치
        run: pip install requests

      - name: 자동화 스크립트 실행
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GMAIL_USER: flffkaos@gmail.com
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          mkdir -p ~/.hermes
          cat > ~/.hermes/credentials << EOF
          GH_TOKEN=***          GROQ_API_KEY=***          GMAIL_USER=$GMAIL_USER
          GMAIL_APP_PASSWORD=$GMAIL...WORD
          EOF
          chmod 600 ~/.hermes/credentials

          # 스크립트 다운로드 후 실행
          curl -fsSL https://raw.githubusercontent.com/flffkaos-pixel/ai-lab-free-services/main/run_review.py -o run_review.py
          echo "스크립트 다운로드 완료"
          wc -l run_review.py
          
          # 잠시 대기해서 last_check.json 풀려있지 않게
          git pull origin main --rebase 2>/dev/null || true
          
          python run_review.py

      - name: 완료 로그
        if: always()
        run: echo "✅ Workflow completed"