name: 매일 자동 논문 포스팅

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 의존성
        run: pip install requests

      - name: arXiv 논문 수집 + 한국어 요약
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python scripts/fetch_papers.py

      - name: 새 포스트 커밋 + 푸시 (누적 보존)
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add blog/_posts/ blog/field-*.html scripts/fetch_papers.py 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "변경 없음 - 종료"
          else
            git commit -m "auto: daily papers + fields"
            git push
          fi

      - name: Jekyll 빌드 (커스텀 _site 폴더)
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./blog
          destination: ./_site

      - name: Pages 아티팩트 업로드
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

      - name: GitHub Pages 배포
        id: deployment
        uses: actions/deploy-pages@v4
