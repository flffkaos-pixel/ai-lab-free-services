name: 매일 자동 논문 포스팅

on:
  schedule:
      - cron: '0 21 * * *'
  workflow_dispatch:

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write

    steps:
      - name: master blog 소스 가져오기
        uses: actions/checkout@v4
        with:
          repository: flffkaos-pixel/ai-lab-free-services
          ref: master
          path: blog-src

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests

      - name: arXiv에서 논문 수집
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python blog-src/scripts/fetch_papers.py

      - name: field 페이지 생성
        run: python blog-src/scripts/generate_field_pages_only.py

      - name: Jekyll 빌드
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./blog-src/blog
          destination: ./blog-src/_site

      - name: GitHub Pages 배포
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./blog-src/_site
          publish_branch: gh-pages
          force_orphan: true