name: 매일 자동 논문 포스팅

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write

    steps:
      - uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 패키지 설치
        run: pip install requests

      - name: arXiv에서 논문 수집
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python scripts/fetch_papers.py

      - name: 푸터 제거
        run: python scripts/cleanup_footers.py blog/_posts/

      - name: 자동 커밋
        run: |
          git config user.email "blog-bot@ai-lab.com"
          git config user.name "AI Blog Bot"
          git add blog/ || true
          if ! git diff --staged --quiet; then
            git commit -m "blog: $(date +%Y-%m-%d) 자동 포스팅"
            git push
          fi

      - name: Jekyll 빌드 (blog/ → repo root/_site/)
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./blog
          destination: ./_site

      - name: GitHub Pages로 배포
        id: deployment
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          publish_branch: gh-pages
          force_orphan: true