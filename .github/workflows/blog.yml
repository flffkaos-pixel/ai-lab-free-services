name: 매일 자동 논문 포스팅

on:
  schedule:
    - cron: '0 0 * * *'  # 매일 UTC 0시 = KST 09시
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      contents: write
      id-token: write
      pages: write
    steps:
      - uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 패키지 설치
        run: pip install requests

      - name: arXiv에서 논문 수집 + 한국어 요약 → 파일 생성
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python scripts/fetch_papers.py

      - name: 새 포스트 자동 커밋 & 푸시
        run: |
          git config user.email "blog-bot@ai-lab.com"
          git config user.name "AI Blog Bot"
          git add blog/_posts/ || true
          if git diff --staged --quiet; then
            echo "변경된 파일 없음 (이미 처리됨)"
          else
            git commit -m "blog: $(date +%Y-%m-%d) AI 논문 자동 포스팅"
            git push
            echo "✅ 푸시 완료"
          fi

      - name: Jekyll 사이트 빌드
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./blog
          destination: ./_site

      - name: Pages 배포
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

      - name: Pages 배포 실행
        id: deployment
        uses: actions/deploy-pages@v4