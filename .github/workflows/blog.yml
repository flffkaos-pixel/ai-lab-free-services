name: 매일 자동 논문 포스팅

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 의존성
        run: pip install requests

      - name: arXiv 논문 수집 + 한국어 요약
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python scripts/fetch_papers.py

      - name: 새 포스트 커밋 + 푸시 (누적 보존)
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add blog/_posts/ blog/field-*.html scripts/fetch_papers.py blog/assets/style.css 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "변경 없음 - 종료"
          else
            git commit -m "auto: daily papers + fields"
            git push
          fi

      - name: Jekyll 빌드
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./blog
          destination: ./_site

      - name: GitHub Pages 배포 (gh-pages 브랜치)
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          publish_branch: gh-pages
          force_orphan: false
          user_name: 'github-actions'
          user_email: 'actions@github.com'
          commit_message: 'deploy: ${{ github.event.head_commit.message }}'