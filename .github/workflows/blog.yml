name: 매일 자동 논문 포스팅

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write

    steps:
      - name: blog-data에서 포스트만 가져오기
        run: |
          if git ls-remote --heads https://github.com/flffkaos-pixel/ai-lab-free-services blog-data | grep -q blog-data; then
                      git clone --branch blog-data --depth 1 https://github.com/flffkaos-pixel/ai-lab-free-services.git _data
                    else
                      mkdir -p _data/blog/_posts
                      cd _data && git init && git checkout --orphan blog-data && git commit -m "init blog-data" && git remote add origin https://github.com/flffkaos-pixel/ai-lab-free-services.git && git push -u origin blog-data
                      cd ..
                    fi

      - name: master blog 소스 가져오기
        uses: actions/checkout@v4
        with:
          repository: flffkaos-pixel/ai-lab-free-services
          ref: master
          path: blog-src

      - name: blog-data 포스트를 blog-src에 복사
        run: |
          mkdir -p blog-src/blog/_posts
          cp -r _data/blog/_posts/*.md blog-src/blog/_posts/ 2>/dev/null || true
          echo "Posts: $(ls blog-src/blog/_posts/*.md 2>/dev/null | wc -l)건"

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests

      - name: arXiv에서 논문 수집
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python blog-src/scripts/fetch_papers.py

      - name: blog-data에 포스트만 커밋
        run: |
          cp -r blog-src/blog/_posts/*.md _data/blog/_posts/ 2>/dev/null || true
          cd _data
          git config user.email "blog-bot@ai-lab.com"
          git config user.name "AI Blog Bot"
          git add blog/_posts/
          if ! git diff --staged --quiet; then
            git commit -m "data: $(date +%Y-%m-%d) 논문 $(find blog/_posts -name '*.md' | wc -l)건"
            git push origin blog-data
          fi

      - name: field 페이지 생성
        run: python blog-src/scripts/generate_field_pages_only.py

      - name: Jekyll 빌드
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./blog-src/blog
          destination: ./blog-src/_site

      - name: GitHub Pages 배포
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./blog-src/_site
          publish_branch: gh-pages
          force_orphan: true