name: AI 연구소 - 논문 리뷰 자동화

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: 구글 시트 확인
        run: |
          pip install requests
          python submit_notifier.py